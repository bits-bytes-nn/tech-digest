  header_thumbnail: "https://cdn.jsdelivr.net/gh/youngmki/playground@main/tech-digest-assets/images/peccy.png"
  footer_title: "Thank you for becoming a subscriber to Weekly AI Tech Blog Digest.<br>If you have any questions or feedback, please send them to <a href='mailto:example@example.com' style='color: #007bff; text-decoration: none;'>example@example.com</a>." # footer title
